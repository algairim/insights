<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" font-family="monospace">
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3fb950"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f0883e"/>
    </marker>
  </defs>
  <rect width="900" height="300" fill="#0d1117"/>

  <text x="30" y="36" font-size="19" font-weight="bold" fill="#f0f6fc" stroke="none">The model doesn&#x27;t fix bad data. It launders it.</text>
  <text x="30" y="58" font-size="12.5" fill="#8b949e" stroke="none">Same AI model. Different data discipline. Different truth.</text>

  <g transform="translate(0,8)">

  <!-- connectors drawn FIRST: source box covers start, target border tucks over tip -->
  <line x1="340" y1="110" x2="378.5" y2="110" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="520" y1="110" x2="558.5" y2="110" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="340" y1="181" x2="378.5" y2="181" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="520" y1="181" x2="558.5" y2="181" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <!-- Good path (top row) -->
  <rect x="30" y="80" width="310" height="60" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="185" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#f0f6fc" stroke="none">Governed data</text>
  <text x="185" y="127" text-anchor="middle" font-size="11.5" fill="#3fb950" stroke="none">catalogue &#xB7; lineage &#xB7; policy</text>

  <!-- Shared AI model box spanning both rows -->
  <rect x="380" y="68" width="140" height="143" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="450" y="128" text-anchor="middle" font-size="14" font-weight="600" fill="#f0f6fc" stroke="none">AI</text>
  <text x="450" y="148" text-anchor="middle" font-size="14" font-weight="600" fill="#f0f6fc" stroke="none">model</text>

  <!-- Good output -->
  <rect x="560" y="80" width="310" height="60" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="715" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#f0f6fc" stroke="none">Trusted output</text>
  <text x="715" y="127" text-anchor="middle" font-size="11.5" fill="#3fb950" stroke="none">auditable, grounded in real data</text>

  <!-- Bad path (bottom row) -->
  <rect x="30" y="151" width="310" height="60" rx="8" fill="#1c1407" stroke="#f0883e" stroke-width="1.5"/>
  <text x="185" y="176" text-anchor="middle" font-size="13" font-weight="600" fill="#f0f6fc" stroke="none">Uncatalogued data</text>
  <text x="185" y="198" text-anchor="middle" font-size="11.5" fill="#f0883e" stroke="none">gaps &#xB7; duplicates &#xB7; outdated</text>

  <!-- Bad output -->
  <rect x="560" y="151" width="310" height="60" rx="8" fill="#1c1407" stroke="#f0883e" stroke-width="1.5"/>
  <text x="715" y="172" text-anchor="middle" font-size="13" font-weight="600" fill="#f0f6fc" stroke="none">Confident answer</text>
  <rect x="665" y="183" width="100" height="20" rx="4" fill="#78350f"/>
  <text x="678" y="198" text-anchor="start" font-size="14" font-family="sans-serif" font-weight="bold" fill="#fbbf24" stroke="none">&#9733;</text>
  <text x="694" y="197" text-anchor="start" font-size="11" font-family="monospace" font-weight="bold" fill="#fbbf24" stroke="none">but wrong</text>

  <!-- Arrows — x2 set so the sharp tip (refX=tip-1, ~1.5px overshoot) lands on the box border -->

  <!-- Caption -->
  <text x="450" y="253" text-anchor="middle" font-size="12.5" fill="#8b949e" stroke="none">Skip the unglamorous work of knowing what you have and the AI will still answer.</text>
  <text x="450" y="272" text-anchor="middle" font-size="12.5" fill="#8b949e" stroke="none">It just won&#x27;t be right, and you won&#x27;t know which times.</text>
  </g>
</svg>
