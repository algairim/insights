<svg xmlns="http://www.w3.org/2000/svg" width="900" height="408" viewBox="0 0 900 408" font-family="monospace">
  <rect width="900" height="408" fill="#0d1117"/>

  <text x="30" y="37" font-size="19" font-weight="bold" fill="#f0f6fc" stroke="none">The 2026 model landscape: four tiers, one question</text>
  <text x="30" y="59" font-size="12.5" fill="#8b949e" stroke="none">The capability gap between top models is smaller than the gap between using any of them well versus poorly</text>

  <!-- Tier 1: Closed frontier -->
  <text x="30" y="84" font-size="13" font-weight="bold" fill="#a371f7" stroke="none">Closed frontier</text>
  <rect x="30" y="93" width="263" height="56" rx="8" fill="#161b22" stroke="#a371f7" stroke-width="1.5"/>
  <text x="162" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#f0f6fc" stroke="none">OpenAI GPT-5.5</text>
  <text x="162" y="138" text-anchor="middle" font-size="11.5" fill="#8b949e" stroke="none">reasoning models</text>

  <rect x="307" y="93" width="263" height="56" rx="8" fill="#161b22" stroke="#a371f7" stroke-width="1.5"/>
  <text x="439" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#f0f6fc" stroke="none">Anthropic Opus 4.8</text>
  <text x="439" y="138" text-anchor="middle" font-size="11.5" fill="#8b949e" stroke="none">dynamic workflows</text>

  <rect x="584" y="93" width="263" height="56" rx="8" fill="#161b22" stroke="#a371f7" stroke-width="1.5"/>
  <text x="716" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#f0f6fc" stroke="none">Google Gemini Omni</text>
  <text x="716" y="138" text-anchor="middle" font-size="11.5" fill="#8b949e" stroke="none">any-to-any multimodal</text>

  <!-- Tier 2: Open-weight -->
  <text x="30" y="172" font-size="13" font-weight="bold" fill="#58a6ff" stroke="none">Open-weight tier</text>
  <rect x="30" y="181" width="191" height="56" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="126" y="206" text-anchor="middle" font-size="13" font-weight="600" fill="#f0f6fc" stroke="none">DeepSeek V4</text>
  <text x="126" y="226" text-anchor="middle" font-size="11.5" fill="#8b949e" stroke="none">1M-token, self-hosted</text>

  <rect x="235" y="181" width="191" height="56" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="331" y="206" text-anchor="middle" font-size="13" font-weight="600" fill="#f0f6fc" stroke="none">GLM-5.1</text>
  <text x="331" y="226" text-anchor="middle" font-size="11.5" fill="#8b949e" stroke="none">no Nvidia required</text>

  <rect x="440" y="181" width="191" height="56" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="536" y="206" text-anchor="middle" font-size="13" font-weight="600" fill="#f0f6fc" stroke="none">Cohere-Aleph Alpha</text>
  <text x="536" y="226" text-anchor="middle" font-size="11.5" fill="#8b949e" stroke="none">European sovereign AI</text>

  <rect x="645" y="181" width="222" height="56" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="756" y="206" text-anchor="middle" font-size="13" font-weight="600" fill="#f0f6fc" stroke="none">Nemotron 3</text>
  <text x="756" y="226" text-anchor="middle" font-size="11.5" fill="#8b949e" stroke="none">efficient agent deployment</text>

  <!-- connector -->
  <text x="450" y="256" text-anchor="middle" font-size="12" fill="#8b949e" stroke="none">↓  the practitioner's question is not which tier</text>

  <!-- Tier 3: Integration platforms -->
  <text x="30" y="277" font-size="13" font-weight="bold" fill="#3fb950" stroke="none">Integration platforms</text>
  <rect x="30" y="286" width="263" height="78" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="162" y="311" text-anchor="middle" font-size="13" font-weight="600" fill="#f0f6fc" stroke="none">Copilot Studio</text>
  <text x="162" y="331" text-anchor="middle" font-size="11.5" fill="#8b949e" stroke="none">Microsoft 365 ecosystem</text>
  <text x="162" y="356" text-anchor="middle" font-size="11" fill="#3fb950" stroke="none">for existing M365 clients</text>

  <rect x="307" y="286" width="263" height="78" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="439" y="311" text-anchor="middle" font-size="13" font-weight="600" fill="#f0f6fc" stroke="none">Claude for Small Business</text>
  <text x="439" y="331" text-anchor="middle" font-size="11.5" fill="#8b949e" stroke="none">pre-built SaaS connectors</text>
  <text x="439" y="356" text-anchor="middle" font-size="11" fill="#3fb950" stroke="none">for SME SaaS stacks</text>

  <rect x="584" y="286" width="263" height="78" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="716" y="311" text-anchor="middle" font-size="13" font-weight="600" fill="#f0f6fc" stroke="none">DIY assembly</text>
  <text x="716" y="331" text-anchor="middle" font-size="11.5" fill="#8b949e" stroke="none">open-weight, self-hosted</text>
  <text x="716" y="356" text-anchor="middle" font-size="11" fill="#3fb950" stroke="none">for infrastructure-capable teams</text>

  <text x="450" y="388" text-anchor="middle" font-size="12" fill="#8b949e" stroke="none">The decision is: which integration path fits what the client already uses?</text>
</svg>
