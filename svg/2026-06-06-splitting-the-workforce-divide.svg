<svg xmlns="http://www.w3.org/2000/svg" width="900" height="302" viewBox="0 0 900 302" font-family="monospace">
  <rect width="900" height="302" fill="#0d1117"/>

  <text x="30" y="37" font-size="19" font-weight="bold" fill="#f0f6fc" stroke="none">AI splits the workforce. It doesn&#x27;t just shrink it.</text>
  <text x="30" y="59" font-size="12.5" fill="#8b949e" stroke="none">The gap widens inside the same building, the same team, the same pay band</text>

  <!-- Divider line painted FIRST so star+text rect and panels paint on top -->
  <line x1="450" y1="76" x2="450" y2="236" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Star and text on divider — sits in the gap between panels (405–495), centred on 450 -->
  <rect x="406" y="145" width="88" height="22" rx="4" fill="#0d1117"/>
  <text x="413" y="162" text-anchor="start" font-size="13" font-family="sans-serif" font-weight="bold" fill="#f0b72f" stroke="none">&#9733;</text>
  <text x="429" y="161" text-anchor="start" font-size="11" font-family="monospace" font-weight="bold" fill="#f0b72f" stroke="none">same team</text>

  <!-- Left panel painted AFTER star — green border covers star rect edges -->
  <rect x="30" y="76" width="375" height="175" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="217" y="105" text-anchor="middle" font-size="15" font-weight="bold" fill="#3fb950" stroke="none">AI-fluent employees</text>
  <text x="55" y="135" font-size="12.5" fill="#e6edf3" stroke="none">Write and analyse with AI tools</text>
  <text x="55" y="158" font-size="12.5" fill="#e6edf3" stroke="none">Complete tasks in a fraction of the time</text>
  <text x="55" y="181" font-size="12.5" fill="#e6edf3" stroke="none">Output per day: multiplied</text>
  <text x="55" y="219" font-size="12.5" font-weight="bold" fill="#3fb950" stroke="none">Relative value: rising</text>

  <!-- Right panel painted AFTER star -->
  <rect x="495" y="76" width="375" height="175" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="682" y="105" text-anchor="middle" font-size="15" font-weight="bold" fill="#8b949e" stroke="none">Not yet fluent</text>
  <text x="520" y="135" font-size="12.5" fill="#8b949e" stroke="none">Working the same way as before</text>
  <text x="520" y="158" font-size="12.5" fill="#8b949e" stroke="none">Time per task: unchanged</text>
  <text x="520" y="181" font-size="12.5" fill="#8b949e" stroke="none">Output per day: same</text>
  <text x="520" y="219" font-size="12.5" font-weight="bold" fill="#f0883e" stroke="none">Relative value: flat or falling</text>

  <text x="450" y="280" text-anchor="middle" font-size="12.5" fill="#8b949e" stroke="none">Same pay band. The output gap is already wide. The firm finds out in its retention numbers.</text>
</svg>
