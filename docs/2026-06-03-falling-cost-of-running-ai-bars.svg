<svg xmlns="http://www.w3.org/2000/svg" width="900" height="390" viewBox="0 0 900 390" font-family="monospace">
  <rect width="900" height="390" fill="#0d1117"/>

  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#f0f6fc" stroke="none">Five levers that cut the cost of running AI</text>
  <text x="450" y="57" text-anchor="middle" font-size="12" fill="#6b7280" stroke="none">Most businesses pay the default. None of these require building anything.</text>

  <!-- Baseline -->
  <line x1="80" y1="300" x2="860" y2="300" stroke="#374151" stroke-width="2"/>

  <!-- Bar 1: Semantic caching — green, tallest -->
  <rect x="100" y="132" width="100" height="168" rx="3" fill="#3fb950"/>
  <text x="150" y="108" text-anchor="middle" font-size="11" fill="#86efac" stroke="none">Skips the model</text>
  <text x="150" y="122" text-anchor="middle" font-size="11" fill="#86efac" stroke="none">entirely</text>
  <text x="150" y="322" text-anchor="middle" font-size="11" fill="#9ca3af" stroke="none">Semantic</text>
  <text x="150" y="337" text-anchor="middle" font-size="11" fill="#9ca3af" stroke="none">caching</text>

  <!-- Bar 2: Prompt caching — blue -->
  <rect x="270" y="157" width="100" height="143" rx="3" fill="#58a6ff"/>
  <text x="320" y="133" text-anchor="middle" font-size="11" fill="#93c5fd" stroke="none">No repeat</text>
  <text x="320" y="147" text-anchor="middle" font-size="11" fill="#93c5fd" stroke="none">charges</text>
  <text x="320" y="322" text-anchor="middle" font-size="11" fill="#9ca3af" stroke="none">Prompt</text>
  <text x="320" y="337" text-anchor="middle" font-size="11" fill="#9ca3af" stroke="none">caching</text>

  <!-- Bar 3: Model routing — purple -->
  <rect x="440" y="185" width="100" height="115" rx="3" fill="#a371f7"/>
  <text x="490" y="161" text-anchor="middle" font-size="11" fill="#c4b5fd" stroke="none">Right model</text>
  <text x="490" y="175" text-anchor="middle" font-size="11" fill="#c4b5fd" stroke="none">right cost</text>
  <text x="490" y="322" text-anchor="middle" font-size="11" fill="#9ca3af" stroke="none">Model</text>
  <text x="490" y="337" text-anchor="middle" font-size="11" fill="#9ca3af" stroke="none">routing</text>

  <!-- Bar 4: Quantization — orange -->
  <rect x="610" y="210" width="100" height="90" rx="3" fill="#f0883e"/>
  <text x="660" y="186" text-anchor="middle" font-size="11" fill="#fdba74" stroke="none">Cheaper</text>
  <text x="660" y="200" text-anchor="middle" font-size="11" fill="#fdba74" stroke="none">hardware</text>
  <text x="660" y="322" text-anchor="middle" font-size="11" fill="#9ca3af" stroke="none">Quantiz-</text>
  <text x="660" y="337" text-anchor="middle" font-size="11" fill="#9ca3af" stroke="none">ation</text>

  <!-- Bar 5: Edge AI — gold -->
  <rect x="780" y="228" width="60" height="72" rx="3" fill="#f0b72f"/>
  <text x="810" y="218" text-anchor="middle" font-size="11" fill="#fde68a" stroke="none">At the edge</text>
  <text x="810" y="322" text-anchor="middle" font-size="11" fill="#9ca3af" stroke="none">Edge AI</text>
  <text x="810" y="337" text-anchor="middle" font-size="11" fill="#9ca3af" stroke="none">&#x2F; small</text>

  <!-- Y-axis label -->
  <text x="44" y="220" text-anchor="middle" font-size="10" fill="#6b7280" stroke="none" transform="rotate(-90,44,220)">cost reduction potential</text>

  <text x="450" y="372" text-anchor="middle" font-size="12" fill="#fda4af" stroke="none">A business paying frontier prices for work a small routed model could do is paying for a default nobody changed.</text>
</svg>
