<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" font-family="monospace">
  <defs>
    <marker id="arrowGold" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f0b72f"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
  </defs>
  <rect width="900" height="460" fill="#0d1117"/>

  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#f0f6fc" stroke="none">One resource. Four channels. No shared count.</text>
  <text x="450" y="63" text-anchor="middle" font-size="13" fill="#8b949e" stroke="none">The same finite thing sold through channels that each behave as if they own all of it</text>

  <!-- Top channel box -->
  <rect x="350" y="80" width="200" height="60" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="450" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#f0f6fc" stroke="none">Booking platform</text>
  <text x="450" y="128" text-anchor="middle" font-size="11.5" fill="#58a6ff" stroke="none">believes it has: all of it</text>

  <!-- Spoke top to center — blue to match Booking platform box -->
  <line x1="450" y1="140" x2="450" y2="218" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Center resource box -->
  <rect x="310" y="220" width="280" height="88" rx="8" fill="#1a1500" stroke="#f0b72f" stroke-width="2.5"/>
  <text x="398" y="251" text-anchor="start" font-size="16" font-family="sans-serif" font-weight="bold" fill="#f0b72f" stroke="none">&#9733;</text>
  <text x="416" y="249" text-anchor="start" font-size="12" font-family="monospace" font-weight="bold" fill="#f0b72f" stroke="none">ONE RESOURCE</text>
  <text x="450" y="271" text-anchor="middle" font-size="12.5" fill="#8b949e" stroke="none">seats &#xB7; harvest &#xB7; stock &#xB7; hours</text>
  <text x="450" y="292" text-anchor="middle" font-size="10" fill="#f0883e" stroke="none">finite — nobody knows how much is left</text>

  <!-- Spoke left -->
  <line x1="310" y1="264" x2="248" y2="264" stroke="#f0b72f" stroke-width="1.5" marker-end="url(#arrowGold)"/>
  <!-- Spoke right -->
  <line x1="590" y1="264" x2="652" y2="264" stroke="#f0b72f" stroke-width="1.5" marker-end="url(#arrowGold)"/>
  <!-- Spoke bottom -->
  <line x1="450" y1="308" x2="450" y2="354" stroke="#f0b72f" stroke-width="1.5" marker-end="url(#arrowGold)"/>

  <!-- Left channel -->
  <rect x="50" y="236" width="196" height="60" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="148" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#f0f6fc" stroke="none">Walk-in counter</text>
  <text x="148" y="282" text-anchor="middle" font-size="11.5" fill="#3fb950" stroke="none">believes it has: all of it</text>

  <!-- Right channel -->
  <rect x="654" y="236" width="196" height="60" rx="8" fill="#161b22" stroke="#a371f7" stroke-width="1.5"/>
  <text x="752" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#f0f6fc" stroke="none">Partner agent</text>
  <text x="752" y="282" text-anchor="middle" font-size="11.5" fill="#a371f7" stroke="none">believes it has: all of it</text>

  <!-- Bottom channel -->
  <rect x="350" y="356" width="200" height="60" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="450" y="382" text-anchor="middle" font-size="13" font-weight="600" fill="#f0f6fc" stroke="none">Online shop</text>
  <text x="450" y="402" text-anchor="middle" font-size="11.5" fill="#f0883e" stroke="none">believes it has: all of it</text>

  <!-- Caption -->
  <text x="450" y="440" text-anchor="middle" font-size="12.5" fill="#8b949e" stroke="none">The friction is not the selling. It is that no single place knows what is actually left.</text>
</svg>
