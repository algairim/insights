<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340" font-family="monospace">
  <rect width="900" height="340" fill="#0d1117"/>

  <text x="30" y="33" font-size="19" font-weight="bold" fill="#f0f6fc" stroke="none">The first agent is an assistant. The tenth is a workforce nobody hired.</text>
  <text x="30" y="55" font-size="12.5" fill="#8b949e" stroke="none">How the vendors responded tells you when the problem became real</text>

  <g transform="translate(0,8)">

  <!-- Timeline baseline -->
  <line x1="40" y1="168" x2="868" y2="168" stroke="#30363d" stroke-width="2"/>
  <polygon points="868,163 878,168 868,173" fill="#30363d"/>

  <!-- Stage 1: 1 agent (above, green) -->
  <line x1="150" y1="120" x2="150" y2="161" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="150" cy="168" r="7" fill="#3fb950"/>
  <text x="150" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#3fb950" stroke="none">1 agent</text>
  <text x="150" y="93" text-anchor="middle" font-size="11.5" fill="#3fb950" stroke="none">First deployment</text>
  <text x="150" y="109" text-anchor="middle" font-size="11.5" fill="#8b949e" stroke="none">feels like an assistant</text>

  <!-- Stage 2: 5 agents (below, orange) -->
  <line x1="370" y1="175" x2="370" y2="200" stroke="#f0883e" stroke-width="1.5"/>
  <circle cx="370" cy="168" r="7" fill="#f0883e"/>
  <text x="370" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#f0883e" stroke="none">5 agents</text>
  <text x="370" y="236" text-anchor="middle" font-size="11.5" fill="#f0883e" stroke="none">Functions overlap</text>
  <text x="370" y="252" text-anchor="middle" font-size="11.5" fill="#8b949e" stroke="none">someone asks who owns what</text>

  <!-- Stage 3: 10+ agents (above, gold star) -->
  <circle cx="620" cy="168" r="14" fill="none" stroke="#f0b72f" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="620" y1="108" x2="620" y2="152" stroke="#f0b72f" stroke-width="2"/>
  <circle cx="620" cy="168" r="9" fill="#f0b72f"/>
  <rect x="580" y="46" width="80" height="20" rx="4" fill="#1a1500"/>
  <text x="585" y="62" text-anchor="start" font-size="13" font-family="sans-serif" font-weight="bold" fill="#fbbf24" stroke="none">&#9733;</text>
  <text x="601" y="61" text-anchor="start" font-size="11" font-family="monospace" font-weight="bold" fill="#fbbf24" stroke="none">THE RISK</text>
  <text x="620" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#f0b72f" stroke="none">10+ agents</text>
  <text x="620" y="98" text-anchor="middle" font-size="11.5" fill="#f0b72f" stroke="none">A workforce nobody hired</text>

  <!-- Stage 4: Control plane (below, purple) — moved left so labels clear the right edge -->
  <line x1="788" y1="175" x2="788" y2="200" stroke="#a371f7" stroke-width="1.5"/>
  <circle cx="788" cy="168" r="7" fill="#a371f7"/>
  <text x="788" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#a371f7" stroke="none">Control plane</text>
  <text x="788" y="236" text-anchor="middle" font-size="10" fill="#a371f7" stroke="none">SAP &#xB7; Microsoft &#xB7; Itential</text>
  <text x="788" y="252" text-anchor="middle" font-size="11.5" fill="#8b949e" stroke="none">vendors ship governance</text>

  <!-- Caption box -->
  <rect x="30" y="278" width="840" height="34" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="300" text-anchor="middle" font-size="11" fill="#c9d1d9" stroke="none">When the platforms race to sell control planes, it is a sign the thing being controlled has already gotten loose.</text>
  </g>
</svg>
